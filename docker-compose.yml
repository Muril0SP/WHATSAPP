version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=file:/app/data/dev.sqlite
      - SESSION_PATH=/app/data/sessions
      - STORAGE_PATH=/app/data/storage
      - JWT_SECRET=${JWT_SECRET:-altere-em-producao}
    volumes:
      - backend_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  backend_data:
